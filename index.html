  tailwind.config = {

<style>
  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    height: 6px;
    border-radius: 9999px;
    background: linear-gradient(to right, #c0000d var(--fill, 50%), #f5c9cc var(--fill, 50%));

  input[type="range"]::-webkit-slider-thumb {

  input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.15); }

    width: 22px;
    height: 22px;
    border-radius: 9999px;

  }

<body class="bg-brand-50">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ---------- 数値アニメーションフック ---------- */
function useAnimatedNumber(target, duration = 450) {
  const [display, setDisplay] = useState(target);
  const fromRef = useRef(target);
  const rafRef = useRef(null);

  useEffect(() => {
    const from = fromRef.current;
    if (from === target) return;
    const start = performance.now();
    const tick = (now) => {
      const p = Math.min((now - start) / duration, 1);
      const eased = 1 - Math.pow(1 - p, 3); // easeOutCubic
      const val = from + (target - from) * eased;
      setDisplay(val);
      if (p < 1) {
        rafRef.current = requestAnimationFrame(tick);
      } else {
        fromRef.current = target;
      }
    };
    cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(tick);
    // 非表示タブ等でrAFが止まっても最終値を保証する
    const safety = setTimeout(() => {
      fromRef.current = target;
      setDisplay(target);
    }, duration + 100);
    return () => {
      cancelAnimationFrame(rafRef.current);
      clearTimeout(safety);
    };
  }, [target, duration]);

  return display;
}

/* ---------- 表示フォーマッタ ---------- */
const fmtInt = (n) => Math.round(n).toLocaleString("ja-JP");
const fmt1 = (n) =>
  n.toLocaleString("ja-JP", { minimumFractionDigits: 1, maximumFractionDigits: 1 });

/* ---------- 入力スライダー ---------- */
function InputSlider({ label, unit, value, min, max, step, onChange, hint }) {
  const fill = ((value - min) / (max - min)) * 100;
  // フォーカス中は編集用の生文字列、非フォーカス時はカンマ付き表示
  const [editing, setEditing] = useState(null);
  const formatted = value.toLocaleString("ja-JP", { maximumFractionDigits: 2 });
  return (
    <div className="mb-7">
      <div className="flex items-end justify-between mb-2 gap-3">
        <label
          className={
            "text-[15px] font-semibold text-brand-900 leading-snug whitespace-nowrap shrink-0 " +
            (hint ? "relative group cursor-help border-b border-dashed border-brand-300" : "")
          }
        >
          {label}
          {hint && (
            <div className="pointer-events-none absolute z-20 top-full left-0 mt-2 w-64 whitespace-normal rounded-xl border border-brand-100 bg-white p-3 text-left text-xs font-normal leading-relaxed text-slate-600 shadow-xl opacity-0 invisible transition-opacity duration-150 group-hover:opacity-100 group-hover:visible">
              {hint}
            </div>
          )}
        </label>
      </div>
      <div className="flex items-center gap-3 mb-2">
        <input
          type="text"
          inputMode="decimal"
          className="w-40 rounded-lg border border-brand-200 bg-white px-3 py-2 text-right text-2xl font-bold text-brand-900 focus:border-brand-600 focus:ring-2 focus:ring-brand-200 focus:outline-none"
          value={editing !== null ? editing : formatted}
          onFocus={() => setEditing(String(value))}
          onBlur={() => setEditing(null)}
          onChange={(e) => {
            setEditing(e.target.value);
            const v = parseFloat(e.target.value.replace(/,/g, ""));
            if (!isNaN(v)) onChange(v);
          }}
        />
        <span className="text-sm text-slate-500 font-medium whitespace-nowrap">{unit}</span>
      </div>
      <input
        type="range"
        className="w-full"
        style={{ "--fill": fill + "%" }}
        value={value}
        min={min}
        max={max}
        step={step}
        onChange={(e) => onChange(parseFloat(e.target.value))}
      />
    </div>
  );
}

/* ---------- テーブル見出し（ホバーで説明） ---------- */
function ThInfo({ children, tip, align = "right", sub }) {
  return (
    <th
      className={
        "px-5 py-4 font-semibold whitespace-nowrap relative group " +
        (align === "left" ? "text-left" : "text-right")
      }
    >
      <span className="cursor-help border-b border-dashed border-white/40 pb-0.5">
        {children}
      </span>
      {sub && <span className="block text-[11px] font-normal text-brand-300 mt-0.5">{sub}</span>}
      <div
        className={
          "pointer-events-none absolute z-20 top-full mt-2 w-72 whitespace-normal rounded-xl border border-brand-100 bg-white p-3 text-left text-xs font-normal leading-relaxed text-slate-600 shadow-xl opacity-0 invisible transition-opacity duration-150 group-hover:opacity-100 group-hover:visible " +
          (align === "left" ? "left-0" : "right-0")
        }
      >
        {tip}
      </div>
    </th>
  );
}

/* ---------- KPIカード ---------- */
function KpiCard({ label, value, unit, sub, accent }) {
  const animated = useAnimatedNumber(value);
  const isDecimal = value < 100;
  return (
    <div
      className={
        "rounded-2xl p-7 shadow-sm border transition-shadow hover:shadow-md " +
        (accent
          ? "bg-brand-900 border-brand-900 text-white"
          : "bg-white border-brand-100 text-brand-900")
      }
    >
      <p className={"text-sm font-semibold tracking-wide mb-3 " + (accent ? "text-brand-200" : "text-slate-500")}>
        {label}
      </p>
      <p className="num-transition flex items-baseline gap-1.5">
        <span className="text-[56px] leading-none font-bold tabular-nums">
          {isDecimal ? fmt1(animated) : fmtInt(animated)}
        </span>
        <span className={"text-xl font-semibold whitespace-nowrap " + (accent ? "text-brand-200" : "text-slate-500")}>
          {unit}
        </span>
      </p>
      {sub && (
        <p className={"mt-3 text-sm leading-relaxed " + (accent ? "text-brand-300" : "text-slate-400")}>
          {sub}
        </p>
      )}
    </div>
  );
}

/* ---------- トグルスイッチ ---------- */
function ToggleSwitch({ checked, onChange }) {
  return (
    <button
      type="button"
      role="switch"
      aria-checked={checked}
      onClick={onChange}
      className={
        "relative inline-flex h-6 w-11 shrink-0 items-center rounded-full transition-colors focus:outline-none focus:ring-2 focus:ring-brand-200 " +
        (checked ? "bg-brand-900" : "bg-slate-300")
      }
    >
      <span
        className={
          "inline-block h-4 w-4 transform rounded-full bg-white shadow transition-transform " +
          (checked ? "translate-x-6" : "translate-x-1")
        }
      />
    </button>
  );
}

/* ---------- 個別設定モード用の数値入力 ---------- */
function ManualViewsInput({ value, onChange }) {
  const [editing, setEditing] = useState(null);
  const formatted = value.toLocaleString("ja-JP", { maximumFractionDigits: 2 });
  return (
    <input
      type="text"
      inputMode="decimal"
      className="w-28 rounded-lg border border-brand-200 bg-white px-2 py-1.5 text-right text-lg font-bold tabular-nums text-brand-900 focus:border-brand-600 focus:outline-none focus:ring-2 focus:ring-brand-200"
      value={editing !== null ? editing : formatted}
      onFocus={() => setEditing(String(value))}
      onBlur={() => setEditing(null)}
      onChange={(e) => {
        setEditing(e.target.value);
        const v = parseFloat(e.target.value.replace(/,/g, ""));
        if (!isNaN(v)) onChange(v);
      }}
    />
  );
}

/* ---------- アニメーション付きテーブルセル ---------- */
function AnimatedCell({ value, decimals = 0, highlight }) {
  const animated = useAnimatedNumber(value);
  return (
    <span className={"tabular-nums " + (highlight ? "font-bold text-brand-900" : "")}>
      {decimals > 0
        ? animated.toLocaleString("ja-JP", {
            minimumFractionDigits: decimals,
            maximumFractionDigits: decimals,
          })
        : fmtInt(animated)}
    </span>
  );
}

/* ---------- メインコンポーネント ---------- */
function RoiSimulator() {
  const [fee, setFee] = useState(200000);        // 運用代行プラン月額費用
  const [price, setPrice] = useState(500000);    // お客様サービス単価
  const [closeRate, setCloseRate] = useState(20);   // 商談成約率 %
  const [listRate, setListRate] = useState(0.2);    // リストイン転換率 %
  const [posts, setPosts] = useState(4);            // 月間投稿本数
  const [termMonths, setTermMonths] = useState(6);  // 契約期間（ヶ月）
  const [goalMode, setGoalMode] = useState(false);   // 目標設定モードのON/OFF
  const [goalMetric, setGoalMetric] = useState("views"); // "views" | "lists" | "deals"
  const [goalValue, setGoalValue] = useState(1000);  // 選択中の指標に対する目標値
  const [goalMonth, setGoalMonth] = useState(6);     // 目標を達成する「何ヶ月後」

  /* --- 計算ロジック --- */
  const breakEvenDeals = price > 0 ? fee / price : 0;                       // 必要月間成約数
  const requiredLists = closeRate > 0 ? breakEvenDeals / (closeRate / 100) : 0; // 必要な月間リスト数
  const autoTargetViews = listRate > 0 ? requiredLists / (listRate / 100) : 0;  // 必要月間再生回数（自動計算）

  // 選択中の指標に応じた「自動計算した場合の値」（切り替え時の初期値引き継ぎに使う）
  const autoValueForMetric = { views: autoTargetViews, lists: requiredLists, deals: breakEvenDeals };

  // 契約期間を超える指定は無効なので契約月数でクランプする
  const effectiveGoalMonth = Math.min(Math.max(1, Math.round(goalMonth) || 1), termMonths);

  // 自動→手動へ切り替える瞬間は、直前の自動計算値・契約最終月を初期値として引き継ぐ
  const handleToggleGoalMode = () => {
    if (!goalMode) {
      setGoalValue(autoValueForMetric[goalMetric]);
      setGoalMonth(termMonths);
    }
    setGoalMode((v) => !v);
  };

  // 対象指標を切り替えた際も、その指標の自動計算値を初期値として引き継ぐ
  const handleGoalMetricChange = (metric) => {
    setGoalMetric(metric);
    setGoalValue(autoValueForMetric[metric]);
  };

  /* --- 契約期間ロードマップ ---
     目標設定モードOFF、または対象が「月間再生回数」の場合：
     予測再生数 = 目標再生数 × (累計ストック / (投稿数×目標達成月))^1.5 という
     複利成長カーブを月間再生数に適用し、そこからリストイン数・成約数を
     順算する。対象が「リストイン数」「成約数」の場合は、その指標に
     複利成長カーブを適用し、他の指標は転換率・成約率で逆算/順算する。
     目標達成月は契約期間内で自由に指定でき、それより後の月は同じ
     カーブの延長線上でさらに伸び続ける想定にする。 */
  const months = Array.from({ length: termMonths }, (_, i) => {
    const m = i + 1;
    const stock = posts * m;
    const curveMonths = goalMode ? effectiveGoalMonth : termMonths;
    const ratio = posts > 0 ? stock / (posts * curveMonths) : 0;
    const curve = Math.pow(ratio, 1.5);

    let views, lists, deals;
    if (goalMode && goalMetric === "lists") {
      lists = goalValue * curve;
      views = listRate > 0 ? lists / (listRate / 100) : 0;
      deals = lists * (closeRate / 100);
    } else if (goalMode && goalMetric === "deals") {
      deals = goalValue * curve;
      lists = closeRate > 0 ? deals / (closeRate / 100) : 0;
      views = listRate > 0 ? lists / (listRate / 100) : 0;
    } else {
      const target = goalMode ? goalValue : autoTargetViews;
      views = target * curve;
      lists = views * (listRate / 100);
      deals = lists * (closeRate / 100);
    }

    const revenue = deals * price;
    const profit = revenue - fee;
    return { m, posts, stock, views, lists, deals, revenue, profit };
  });

  return (
    <div className="min-h-screen font-sans text-gray-800">
      {/* ヘッダー */}
      <header className="bg-brand-950 text-white">
        <div className="max-w-[1400px] mx-auto px-8 py-6 flex items-center gap-4">
          <img src="./logo.png" alt="ロゴ" className="w-12 h-12 rounded-lg object-cover" />
          <div>
            <p className="text-xs tracking-[0.25em] text-brand-300 font-semibold mb-1">
              株式会社EAVAL
            </p>
            <h1 className="text-2xl font-bold tracking-wide">
              YouTube運用シミュレーター
            </h1>
          </div>
        </div>
      </header>

      <main className="max-w-[1400px] mx-auto px-8 py-10 grid grid-cols-1 lg:grid-cols-[360px_1fr] gap-10">
        {/* ===== サイドバー：入力 ===== */}
        <aside>
          <div className="bg-white rounded-2xl border border-brand-100 shadow-sm p-8 sticky top-8">
            <h2 className="text-lg font-bold mb-1 flex items-center gap-2">
              <span className="inline-block w-2 h-6 rounded bg-brand-900"></span>
              シミュレーション条件
            </h2>
            <p className="text-xs text-slate-400 mb-8">
              数値を動かすと右側の結果が即時に更新されます
            </p>

            <InputSlider
              label="運用代行プラン月額費用"
              unit="円 / 月"
              value={fee}
              min={50000}
              max={2000000}
              step={1000}
              onChange={setFee}
            />
            <InputSlider
              label="お客様サービス単価"
              unit="円"
              value={price}
              min={100000}
              max={3000000}
              step={10000}
              onChange={setPrice}
            />
            <InputSlider
              label="商談成約率"
              unit="%"
              value={closeRate}
              min={1}
              max={100}
              step={1}
              onChange={setCloseRate}
              hint="リストからの商談で成約に至る割合"
            />
            <InputSlider
              label="公式LINEリストイン転換率"
              unit="%"
              value={listRate}
              min={0.05}
              max={5}
              step={0.05}
              onChange={setListRate}
              hint="再生数のうち公式LINE登録に至る割合"
            />
            <InputSlider
              label="月間投稿本数"
              unit="本 / 月"
              value={posts}
              min={1}
              max={20}
              step={1}
              onChange={setPosts}
            />
            <InputSlider
              label="契約期間"
              unit="ヶ月"
              value={termMonths}
              min={3}
              max={24}
              step={1}
              onChange={setTermMonths}
              hint="ロードマップ表はこの期間で表示されます"
            />
          </div>
        </aside>

        {/* ===== メイン：ダッシュボード ===== */}
        <section className="min-w-0">
          {/* --- セクション1：目標KPIサマリー --- */}
          <div className="mb-4 flex items-center gap-2">
            <span className="inline-block w-2 h-6 rounded bg-brand-900"></span>
            <h2 className="text-lg font-bold">損益分岐ライン</h2>
          </div>
          <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            <KpiCard
              accent
              label="損益分岐点：必要な月間成約数"
              value={breakEvenDeals}
              unit="件 / 月"
              sub={`月額費用 ${fmtInt(fee)}円 ÷ サービス単価 ${fmtInt(price)}円`}
            />
            <KpiCard
              label="必要な月間リスト数"
              value={requiredLists}
              unit="件 / 月"
              sub={`成約率 ${closeRate}% で ${fmt1(breakEvenDeals)}件 成約するために必要`}
            />
            <KpiCard
              label="必要月間再生回数"
              value={autoTargetViews}
              unit="回 / 月"
              sub={`転換率 ${listRate}% で ${fmt1(requiredLists)}件 リスト獲得するために必要`}
            />
          </div>

          {/* --- セクション2：成長ロードマップ --- */}
          <div className="mb-4 flex items-center justify-between flex-wrap gap-3">
            <div className="flex items-center gap-2">
              <span className="inline-block w-2 h-6 rounded bg-brand-900"></span>
              <h2 className="text-lg font-bold">契約期間（{termMonths}ヶ月）の成長ロードマップ</h2>
            </div>
            <div className="flex items-center gap-3 rounded-full border border-brand-100 bg-white px-4 py-2 shadow-sm">
              <span className="text-sm font-semibold text-brand-900 whitespace-nowrap">目標設定モード</span>
              <ToggleSwitch checked={goalMode} onChange={handleToggleGoalMode} />
              {goalMode && (
                <div className="flex items-center gap-1.5 border-l border-brand-100 pl-3">
                  <select
                    value={goalMetric}
                    onChange={(e) => handleGoalMetricChange(e.target.value)}
                    className="rounded-lg border border-brand-200 bg-white px-2 py-1.5 text-xs font-semibold text-brand-900 focus:border-brand-600 focus:outline-none focus:ring-2 focus:ring-brand-200"
                  >
                    <option value="views">月間再生回数</option>
                    <option value="lists">リストイン数</option>
                    <option value="deals">成約数</option>
                  </select>
                  <ManualViewsInput key={goalMetric} value={goalValue} onChange={setGoalValue} />
                  <span className="text-xs text-slate-500 whitespace-nowrap">
                    {goalMetric === "views" ? "回 / 月" : "件 / 月"}
                  </span>
                  <div className="flex items-center gap-1 border-l border-brand-100 pl-3">
                    <input
                      type="number"
                      min={1}
                      max={termMonths}
                      value={goalMonth}
                      onChange={(e) => {
                        const v = parseInt(e.target.value, 10);
                        setGoalMonth(isNaN(v) ? 1 : v);
                      }}
                      className="w-14 rounded-lg border border-brand-200 bg-white px-2 py-1.5 text-right text-sm font-bold tabular-nums text-brand-900 focus:border-brand-600 focus:outline-none focus:ring-2 focus:ring-brand-200"
                    />
                    <span className="text-xs text-slate-500 whitespace-nowrap">ヶ月後に達成</span>
                  </div>
                </div>
              )}
            </div>
          </div>

          <div className="bg-white rounded-2xl border border-brand-100 shadow-sm overflow-hidden">
            <div className="overflow-x-auto">
              <table className="w-full text-[17px]">
                <thead>
                  <tr className="bg-brand-900 text-white">
                    <ThInfo align="left" tip="契約開始からの経過月数です。">
                      経過月
                    </ThInfo>
                    <ThInfo tip="その月に新規に投稿する動画の本数です。サイドバーの「月間投稿本数」の値がそのまま入ります。">
                      当月投稿数
                    </ThInfo>
                    <ThInfo
                      sub="資産となる動画本数"
                      tip="契約開始からその月までに公開した動画の累計本数です。動画は投稿後も再生され続けるため、積み上がるほど将来の再生数の土台（資産）になります。"
                    >
                      累計ストック
                    </ThInfo>
                    <ThInfo
                      tip={
                        goalMode && goalMetric === "views"
                          ? `目標設定モードで入力した目標月間再生回数へ、${effectiveGoalMonth}ヶ月後に複利的に到達すると仮定した、その月の目標月間再生数です。`
                          : goalMode
                          ? "選択中の目標指標から逆算した、その月の月間再生数です。"
                          : "累計ストック本数の伸びに応じて複利的に増加すると仮定した、その月の予測月間再生数です。契約最終月にKPIサマリーの「必要月間再生回数」へちょうど到達するよう計算しています。"
                      }
                    >
                      {goalMode && goalMetric === "views" ? "目標 月間再生数" : "予測 月間再生数"}
                    </ThInfo>
                    <ThInfo
                      tip={
                        goalMode && goalMetric === "lists"
                          ? `目標設定モードで入力した目標リストイン数へ、${effectiveGoalMonth}ヶ月後に複利的に到達すると仮定した、その月のリストイン数です。`
                          : "予測月間再生数 ×（公式LINEリストイン転換率 ÷ 100）で算出した、公式LINEへの登録数の予測値です。"
                      }
                    >
                      {goalMode && goalMetric === "lists" ? "目標 リストイン数" : "予測 リストイン数"}
                    </ThInfo>
                    <ThInfo
                      tip={
                        goalMode && goalMetric === "deals"
                          ? `目標設定モードで入力した目標成約数へ、${effectiveGoalMonth}ヶ月後に複利的に到達すると仮定した、その月の成約数です。`
                          : "予測リストイン数 ×（商談成約率 ÷ 100）で算出した、バックエンド商材の成約数の予測値です。"
                      }
                    >
                      {goalMode && goalMetric === "deals" ? "目標 成約数" : "予測 成約数"}
                    </ThInfo>
                  </tr>
                </thead>
                <tbody>
                  {months.map((r) => {
                    const cleared = breakEvenDeals > 0 && r.deals >= breakEvenDeals;
                    return (
                      <tr
                        key={r.m}
                        className={
                          "border-t border-brand-100 transition-colors " +
                          (cleared ? "bg-brand-50/80" : "bg-white hover:bg-slate-50")
                        }
                      >
                        <td className="px-5 py-4 text-lg font-bold whitespace-nowrap">
                          {r.m}ヶ月目
                          {cleared && (
                            <span className="ml-2 inline-block text-[11px] font-bold text-white bg-brand-700 rounded-full px-2.5 py-0.5 align-middle">
                              黒字圏
                            </span>
                          )}
                        </td>
                        <td className="px-5 py-4 text-right text-lg tabular-nums">{r.posts}本</td>
                        <td className="px-5 py-4 text-right text-lg font-semibold tabular-nums text-brand-700">
                          {r.stock}本
                        </td>
                        <td className="px-5 py-4 text-right text-lg">
                          <AnimatedCell value={r.views} /> 回
                        </td>
                        <td className="px-5 py-4 text-right text-lg">
                          <AnimatedCell value={r.lists} decimals={1} /> 件
                        </td>
                        <td className="px-5 py-4 text-right text-lg">
                          <AnimatedCell value={r.deals} decimals={2} highlight={cleared} /> 件
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
            <div className="px-6 py-4 bg-slate-50 border-t border-brand-100">
              <p className="text-xs text-slate-400 leading-relaxed">
                ※ 予測再生数は「目標月間再生数 ×（累計ストック本数 ÷ 契約期間の総投稿本数）の1.5乗」で算出。
                動画ストックの積み上げに伴い、伸び幅が徐々に大きくなる複利型の成長モデルです。
                実際の数値を保証するものではありません。
              </p>
            </div>
          </div>

          {/* --- ストックの示唆 --- */}
          <div className="mt-8 bg-brand-900 rounded-2xl p-8 text-white flex flex-col md:flex-row md:items-center gap-6">
            <div className="flex-1">
              <p className="text-lg leading-relaxed font-medium">
                {termMonths}ヶ月間で積み上がる <span className="text-[32px] font-bold tabular-nums">{posts * termMonths}</span> 本の動画は、
                契約終了後も再生され続ける営業資産です。
              </p>
            </div>
          </div>
        </section>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<RoiSimulator />);
</script>
</body>
</html>
